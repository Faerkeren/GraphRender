services:
  graph-render:
    build: .
    ports:
      - "${GRAPHRENDER_PORT:-8080}:8080"
    environment:
      - GRAPHRENDER_ICON_CACHE_DIR=/tmp/graphrender-icons
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')",
        ]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3
